<!DOCTYPE html>
<html lang="uk">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Магазин</title>
		<link rel="stylesheet" href="style.css" />
		<link rel="icon" href="logo_white.png" image/png">
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
	</head>
	<body>
		<header>
			<nav>
				<ul>
					<li><a href="#">Головна</a></li>
					<li>
						<a href="#" onclick="toggleCart()"
							>🛒 Кошик (<span id="cartCount">0</span>)</a
						>
					</li>
				</ul>
			</nav>
		</header>

		<h1></h1>

		<div id="productsContainer"></div>

		<div id="cartModal" class="cart-modal">
			<div class="cart-content">
				<h2>Кошик</h2>
				<div id="cartContainer"></div>
				<p>*Доставка 20-30 грн</p>
				<button onclick="clearCart()">Очистити кошик</button>
				<button onclick="closeCart()">Закрити</button>
				<button onclick="sendOrderToTelegram()">Перейти до замовлення</button>
			</div>
		</div>

		<button id="scrollToTopBtn" onclick="scrollToTop()">⬆</button>
		<div id="notification" class="notification"></div>

		<!-- Контейнер для падающих сердечек -->
		<div id="heartsContainer"></div>
		<script src="https://apis.google.com/js/api.js"></script>

		<script src="script.js"></script>
	</body>
</html>
